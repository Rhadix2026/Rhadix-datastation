- indicator_id: hf_vestiging_count
  name: Vestigingen ONS — totaal
  description: >
    Totaal aantal vestigingen in het ONS-bronsysteem.
  source_dataset: vestiging_ons.csv
  dayfirst: true
  aggregation:
    function: count
    field: objectId
  tolerance:
    absolute: 0
    percentage: 0.0
  tags:
    - happy_flow
    - vestigingen
    - ons

- indicator_id: hf_vestiging_uniek_regio
  name: Vestigingen ONS — unieke regio's
  description: >
    Aantal unieke regio's waaronder vestigingen vallen in ONS.
  source_dataset: vestiging_ons.csv
  dayfirst: true
  aggregation:
    function: nunique
    field: regio
  tolerance:
    absolute: 0
    percentage: 0.0
  tags:
    - happy_flow
    - vestigingen
    - ons

