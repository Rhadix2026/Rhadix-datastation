name: Build & push Docker images

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/rhadix2026/datastation-backend
  FRONTEND_IMAGE: ghcr.io/rhadix2026/datastation-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login naar GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Versie uit tag
        id: meta
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            ${{ env.BACKEND_IMAGE }}:latest
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=
            VITE_KIK_ENV=production
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            ${{ env.FRONTEND_IMAGE }}:latest
