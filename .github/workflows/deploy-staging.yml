name: Deploy — Staging

# ─────────────────────────────────────────────────────────────────────────────
# Triggert ALLEEN bij push naar de 'staging' branch.
# Voert eerst CI-tests uit — deployment stopt als tests falen.
# Raakt productie NOOIT aan.
#
# Vereiste GitHub Secrets (zie DEPLOYMENT.md):
#   STAGING_SSH_KEY, STAGING_SSH_HOST, STAGING_SSH_USER
#   STAGING_DB_PASSWORD, STAGING_JWT_SECRET_KEY, STAGING_ADMIN_PASSWORD
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [staging]

env:
  REGISTRY:       ghcr.io
  BACKEND_IMAGE:  ghcr.io/rhadix2026/datastation-backend
  FRONTEND_IMAGE: ghcr.io/rhadix2026/datastation-frontend

jobs:
  test:
    name: Pytest — backend
    runs-on: ubuntu-latest
    env:
      KIK_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Installeer dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Voer tests uit
        working-directory: backend
        run: pytest tests/ --tb=short -v

  build:
    name: Build & push :staging images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login naar GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend :staging
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:staging
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
      - name: Build & push frontend :staging
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=
            VITE_KIK_ENV=staging
          tags: ${{ env.FRONTEND_IMAGE }}:staging
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy naar staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Kopieer docker-compose.staging.yml naar server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          source:   docker-compose.staging.yml
          target:   /opt/datastation-app/
      - name: Schrijf .env.staging en deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cat > /opt/datastation-app/.env.staging << 'ENVEOF'
            GHCR_ORG=rhadix2026
            STAGING_DB_USER=datastation_staging
            STAGING_DB_NAME=datastation_staging
            STAGING_FRONTEND_PORT=5181
            STAGING_BACKEND_PORT=8017
            STAGING_ADMIN_EMAIL=admin@kik-starter.nl
            ENVEOF
            echo "STAGING_DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}"         >> /opt/datastation-app/.env.staging
            echo "STAGING_JWT_SECRET_KEY=${{ secrets.STAGING_JWT_SECRET_KEY }}"   >> /opt/datastation-app/.env.staging
            echo "STAGING_ADMIN_PASSWORD=${{ secrets.STAGING_ADMIN_PASSWORD }}"   >> /opt/datastation-app/.env.staging
            chmod 600 /opt/datastation-app/.env.staging

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -p datastation-staging -f /opt/datastation-app/docker-compose.staging.yml --env-file /opt/datastation-app/.env.staging pull
            docker compose -p datastation-staging -f /opt/datastation-app/docker-compose.staging.yml --env-file /opt/datastation-app/.env.staging up -d --remove-orphans
            echo "✓ Staging deployment klaar"
            docker compose -p datastation-staging -f /opt/datastation-app/docker-compose.staging.yml --env-file /opt/datastation-app/.env.staging ps
      - name: Health check staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            echo "Wacht op backend health check (http://localhost:8017/api/health)..."
            for i in $(seq 1 18); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8017/api/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✓ Backend staging bereikbaar (HTTP $STATUS)"; exit 0
              fi
              echo "  Poging $i/18 — HTTP $STATUS — wacht 5s..."; sleep 5
            done
            echo "✗ Health check mislukt na 90s — logs:"
            docker logs datastation-staging-backend --tail 30 || true
            exit 1
