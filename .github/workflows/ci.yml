name: CI — Tests

# ─────────────────────────────────────────────────────────────────────────────
# Draait bij elke push/PR naar develop, staging of main.
# Voert geen deployment uit. Productie wordt niet aangeraakt.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  test:
    name: Pytest — backend
    runs-on: ubuntu-latest
    env:
      # Tests draaien hermetisch op SQLite (conftest forceert een tijdelijke db)
      KIK_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Zet Python op
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Installeer dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Voer tests uit
        working-directory: backend
        run: pytest tests/ --tb=short -v

  build-check:
    name: Docker build check (smoke test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image (geen push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: datastation-backend:ci-check
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
      - name: Build frontend image (geen push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          build-args: |
            VITE_API_URL=
            VITE_KIK_ENV=ci
          tags: datastation-frontend:ci-check
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
